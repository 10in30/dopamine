# XcodeGen spec for the Solarbloom iOS demo.
#
# SwiftPM cannot emit an `.app`, so this generates `DopamineDemo.xcodeproj`
# around the SwiftUI sources in `Sources/`, depending on the local SwiftPM
# packages by PATH (the package at `..`, i.e. swift/). The macOS CI runs:
#
#   brew install xcodegen
#   cd swift/Demo && xcodegen generate
#   xcodebuild -project DopamineDemo.xcodeproj -scheme DopamineDemo \
#     -destination 'platform=iOS Simulator,name=iPhone 15' build
#
# Then boot a simulator, install, and launch with the autoplay arg:
#   xcrun simctl launch booted ai.polyguard.DopamineDemo -autoplay solarbloom
#
# UNVERIFIED ON LINUX: XcodeGen + xcodebuild + the iOS SDK exist only on macOS.

name: DopamineDemo

options:
  bundleIdPrefix: ai.polyguard
  deploymentTarget:
    iOS: "15.0"
  createIntermediateGroups: true

# The local SwiftPM packages (DopamineCore + DopamineEffectSolarbloom) live one
# directory up. `path` is relative to this project.yml.
packages:
  Dopamine:
    path: ".."
  # comic now ships from the toolchain's dist/ output (the move + rewire): the demo
  # consumes the GENERATED standalone SwiftPM package, exactly like an external app.
  # Run `npm run dopamine -- build` before `xcodegen generate` so this path exists.
  DopamineEffectComic:
    path: "../../dist/swift/DopamineEffectComic"

targets:
  DopamineDemo:
    type: application
    platform: iOS
    sources:
      - path: Sources
    # Let XcodeGen own the Info.plist. A bare `INFOPLIST_FILE` in settings.base
    # was silently dropped (the built .app shipped with NO Info.plist, so simctl
    # reported a missing CFBundleVersion). The `info:` block both WIRES
    # INFOPLIST_FILE / GENERATE_INFOPLIST_FILE=NO and writes a complete plist;
    # XcodeGen merges the standard keys (CFBundleExecutable / Identifier / Name /
    # PackageType, etc.). Versions are QUOTED so they serialize as <string>, which
    # simctl install requires (an integer CFBundleVersion is rejected).
    info:
      path: Info.plist
      properties:
        CFBundleVersion: "1"
        CFBundleShortVersionString: "1.0"
        LSRequiresIPhoneOS: true
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIRequiredDeviceCapabilities:
          - metal
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ai.polyguard.DopamineDemo
        # Automatic signing so device builds (Xcode GUI + install-device.sh) "just
        # work": Xcode provisions the bundle id and registers the connected device
        # under this team. DEVELOPMENT_TEAM is the t-zero Security Inc org team —
        # it's not a secret (it ships in every signed app). Switch teams by editing
        # this one line (or overriding DEVELOPMENT_TEAM= on the xcodebuild line).
        #
        # The simulator CI build stays UNSIGNED: swift.yml passes
        # `CODE_SIGNING_ALLOWED=NO` on the xcodebuild command line, which overrides
        # these settings — so CI never needs a signing identity.
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: HY6Z2F5595
        TARGETED_DEVICE_FAMILY: "1,2"
        SWIFT_VERSION: "5.9"
    dependencies:
      - package: Dopamine
        product: DopamineCore
      - package: Dopamine
        product: DopamineEffectSolarbloom
      - package: Dopamine
        product: DopamineEffectAurora
      - package: DopamineEffectComic
        product: DopamineEffectComic
      - package: Dopamine
        product: DopamineEffectConfetti
      - package: Dopamine
        product: DopamineEffectFail
      - package: Dopamine
        product: DopamineEffectHeartburst
      - package: Dopamine
        product: DopamineEffectInkstroke
      - package: Dopamine
        product: DopamineEffectLightning
      - package: Dopamine
        product: DopamineEffectRipple
      - package: Dopamine
        product: DopamineEffectHalo

schemes:
  DopamineDemo:
    build:
      targets:
        DopamineDemo: all
    run:
      # Convenience: running from Xcode autoplay-fires the effect.
      commandLineArguments:
        "-autoplay solarbloom": false
