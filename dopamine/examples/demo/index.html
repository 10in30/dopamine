<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dopamine — Solarbloom</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0b0d12;
        --card: #141925;
        --card-edge: #222a3a;
        --ink: #eef2fb;
        --muted: #8b95ad;
        --accent: #2f3a54;
      }
      * { box-sizing: border-box; }
      html, body { margin: 0; height: 100%; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, system-ui, sans-serif;
        background: radial-gradient(1200px 800px at 50% -10%, #161c2b 0%, var(--bg) 60%);
        color: var(--ink);
        min-height: 100%;
        display: grid;
        place-items: center;
        padding: 40px 20px;
      }
      .stage {
        width: min(960px, 100%);
        display: grid;
        grid-template-columns: 1.1fr 0.9fr;
        gap: 28px;
        align-items: start;
      }
      @media (max-width: 760px) { .stage { grid-template-columns: 1fr; } }

      .card {
        background: linear-gradient(180deg, #181f2e, var(--card));
        border: 1px solid var(--card-edge);
        border-radius: 20px;
        padding: 28px;
        box-shadow: 0 30px 60px -30px #000;
      }
      .receipt h1 { font-size: 22px; margin: 0 0 4px; letter-spacing: -0.01em; }
      .receipt p.sub { margin: 0 0 22px; color: var(--muted); font-size: 14px; }
      .line { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px dashed var(--accent); font-size: 15px; }
      .line:last-of-type { border-bottom: 0; }
      .line .muted { color: var(--muted); }
      .total { display: flex; justify-content: space-between; margin-top: 18px; font-size: 19px; font-weight: 650; }
      .badge {
        display: inline-flex; align-items: center; gap: 8px;
        margin-top: 22px; padding: 9px 14px; border-radius: 999px;
        background: #10331f; color: #7ff0b0; font-size: 13px; font-weight: 600;
        border: 1px solid #1c5235;
      }

      .panel { display: grid; gap: 18px; }
      .panel h2 { margin: 0; font-size: 13px; text-transform: uppercase; letter-spacing: 0.14em; color: var(--muted); }
      .control { display: grid; gap: 8px; }
      .control label { font-size: 14px; display: flex; justify-content: space-between; }
      .control label b { color: var(--muted); font-weight: 600; }
      .seg { display: flex; gap: 6px; }
      .seg button {
        flex: 1; padding: 9px 0; border-radius: 10px; cursor: pointer; font-size: 13px;
        background: var(--accent); color: var(--ink); border: 1px solid transparent; transition: 0.15s;
      }
      .seg button[aria-pressed="true"] { background: #43507a; border-color: #5d6da3; }
      input[type="range"] { width: 100%; accent-color: #6e7dff; }

      .fire {
        margin-top: 6px; padding: 16px; font-size: 16px; font-weight: 700; cursor: pointer;
        border: 0; border-radius: 14px; color: #0b0d12;
        background: linear-gradient(180deg, #fff, #d7ddf2);
        box-shadow: 0 16px 30px -14px #aeb8ff;
      }
      .fire:active { transform: translateY(1px); }
      .hint { color: var(--muted); font-size: 12px; text-align: center; }
    </style>
  </head>
  <body>
    <main class="stage">
      <section class="card receipt" aria-label="Order summary">
        <h1>Order complete</h1>
        <p class="sub">Confirmation #DOP-2048 · 6 June 2026</p>
        <div class="line"><span>Aurora Desk Lamp</span><span class="muted">$129.00</span></div>
        <div class="line"><span>Pollen Diffuser</span><span class="muted">$58.00</span></div>
        <div class="line"><span>Shipping</span><span class="muted">Free</span></div>
        <div class="total"><span>Total</span><span>$187.00</span></div>
        <span class="badge">✓ Payment confirmed</span>
      </section>

      <section class="panel card" aria-label="Effect controls">
        <h2>Dopamine</h2>
        <div class="control">
          <label>Effect</label>
          <div class="seg" id="effect">
            <button data-effect="solarbloom">Solarbloom</button>
            <button data-effect="inkstroke">Verdict</button>
            <button data-effect="comic" aria-pressed="true">Comic</button>
          </div>
        </div>
        <div class="control">
          <label>Mood</label>
          <div class="seg" id="mood">
            <button data-mood="serene">Serene</button>
            <button data-mood="celebratory" aria-pressed="true">Celebratory</button>
            <button data-mood="electric">Electric</button>
          </div>
        </div>
        <div class="control">
          <label>Intensity <b id="intensity-val">0.70</b></label>
          <input id="intensity" type="range" min="0" max="1" step="0.01" value="0.7" />
        </div>
        <div class="control">
          <label>Whimsy <b id="whimsy-val">0.50</b></label>
          <input id="whimsy" type="range" min="0" max="1" step="0.01" value="0.5" />
        </div>
        <button class="fire" id="fire">Complete order ✨</button>
        <p class="hint">Each fire seeds a unique palette — watch the card catch the light.</p>
      </section>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
