# Dopamine — WEB publish + reel CI.
#
# TWO jobs:
#   1. deploy-demo — build the Vite demo and publish it to GitHub Pages (fast).
#      Runs first so the live site updates without waiting on the slow reel.
#      Only on MAIN (push or dispatch) — PRs and branch dispatches (CI re-kicks,
#      media refreshes) must not publish to the live site, and the Pages
#      environment would reject a non-main deploy anyway.
#   2. reel — render every web effect in headless Chromium (WebGL via SwiftShader,
#      so no GPU is needed) frame-by-frame, stitch them into one reel
#      `e2e/output/dopamine-suite.mp4`, uploaded as an artifact. Runs AFTER the
#      demo is published (the browser-rendered counterpart to swift.yml's iOS clip).
#
# Both run on Linux (ubuntu) — pure Node + Playwright, ~10x cheaper than macOS.
#
# INCREMENTAL reel: per-effect clips are cached between runs. Each run re-renders
# only the effects whose `packages/effect-<name>/**` changed (or ALL when a shared
# input — core, the effects umbrella, the demo, or the reel pipeline — changed),
# then re-stitches the full reel from cached + freshly-rendered clips. See
# scripts/reel-changed.mjs for the policy.
#
# GitHub Pages must be enabled (Settings ▸ Pages ▸ Source: GitHub Actions). The
# deploy job's `configure-pages` with `enablement: true` tries to turn it on
# automatically; if the org blocks that, enable it once by hand.

name: web-reel

on:
  push:
    branches: ["main"]
    paths:
      - "packages/**"
      - "effects/**"          # single-folder effect sources (comic + future effects)
      - "tools/dopamine/**"   # the cross-platform build toolchain
      - "examples/**"
      - "scripts/**"
      - ".github/workflows/web-reel.yml"
  pull_request:
    paths:
      - "packages/**"
      - "effects/**"          # single-folder effect sources (comic + future effects)
      - "tools/dopamine/**"   # the cross-platform build toolchain
      - "examples/**"
      - "scripts/**"
      - ".github/workflows/web-reel.yml"
  workflow_dispatch:

# Least privilege by default; the deploy job widens to what Pages needs.
permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # Publish the Vite demo to GitHub Pages FIRST (fast) so the live site updates
  # promptly, ahead of the slow headless reel render. main / dispatch only.
  # ---------------------------------------------------------------------------
  deploy-demo:
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    # Serialize Pages deployments (don't cancel an in-flight one); scoped to this
    # job so the reel isn't queued behind it.
    concurrency:
      group: pages
      cancel-in-progress: false
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      # Retry: ffmpeg-static downloads its binary at install time and intermittently
      # 504s; retry a few times before failing (it's an optional dep anyway).
      - name: Install deps
        run: |
          n=0
          until npm install; do
            n=$((n+1))
            if [ "$n" -ge 4 ]; then echo "npm install failed after $n attempts"; exit 1; fi
            echo "npm install failed (attempt $n) — retrying in 15s…"; sleep 15
          done

      # `npm run build` runs `dopamine build effects/comic`, which converts the
      # shared woff2 display faces → ttf (fonttools+brotli) for the Swift/Android
      # packages. Web doesn't bundle the ttf (it embeds the faces base64), but the
      # one build command emits all platforms, so the deps must be present.
      - name: Install fonttools (woff2→ttf for dopamine build)
        run: |
          python3 -m pip install --quiet --break-system-packages fonttools brotli \
            || python3 -m pip install --quiet fonttools brotli

      # The demo is a Vite app whose config resolves @dopamine/* to source, so this
      # produces a self-contained static site in examples/demo/dist (base: "./", so
      # it works under the /<repo>/ project-pages path with no hardcoded base).
      - name: Build the web packages + demo
        run: npm run build

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload the demo as a Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: examples/demo/dist

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4

  # ---------------------------------------------------------------------------
  # Render + stitch the reel. Comes AFTER the demo publish; `always()` so PRs
  # (where deploy-demo is skipped) still render it.
  # ---------------------------------------------------------------------------
  reel:
    needs: [deploy-demo]
    if: always()
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      # Full history so reel-changed can diff against the PR base / previous tip.
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      # Retry: ffmpeg-static downloads its binary from GitHub releases at install
      # time, which intermittently 504s and fails the whole install. Retry a few
      # times before giving up so a transient blip doesn't red the reel.
      - name: Install deps
        run: |
          n=0
          until npm install; do
            n=$((n+1))
            if [ "$n" -ge 4 ]; then echo "npm install failed after $n attempts"; exit 1; fi
            echo "npm install failed (attempt $n) — retrying in 15s…"; sleep 15
          done

      # ffmpeg-static is an OPTIONAL dep (its GitHub-releases binary download
      # sometimes 504s); the reel falls back to the system ffmpeg, so make sure one
      # is present (it usually is on ubuntu-latest).
      - name: Ensure ffmpeg
        run: ffmpeg -version >/dev/null 2>&1 || (sudo apt-get update && sudo apt-get install -y ffmpeg)

      - name: Install Chromium (+ OS deps)
        run: npx playwright install --with-deps chromium

      # `npm run build` runs `dopamine build effects/comic` → woff2→ttf font
      # conversion (fonttools+brotli) for the Swift/Android packages.
      - name: Install fonttools (woff2→ttf for dopamine build)
        run: |
          python3 -m pip install --quiet --break-system-packages fonttools brotli \
            || python3 -m pip install --quiet fonttools brotli

      - name: Build the web packages + demo
        run: npm run build

      # Web↔Android shader-dialect mid-frame gate (MUST-PASS): render each
      # effect's canonical web GLSL AND its Android-derived variant (the
      # dopLightOut emit) through headless Chromium/SwiftShader (WebGL2 == the
      # Android GLSL ES 3.00 dialect) and assert the RGB outputs match with Δ0.
      # Self-contained (no committed golden images) — the pixel safety-net for
      # the single-source / generated-shader work.
      - name: Web↔Android shader parity gate
        run: npm run shader-goldens

      # Restore previously-rendered per-effect clips. The key is unique per commit
      # (so a fresh cache is always saved); restore-keys pulls the most recent prior
      # cache (incl. main's) as the baseline of reusable clips.
      - name: Restore reel clips cache
        uses: actions/cache@v4
        with:
          path: e2e/output/clips
          key: reel-clips-${{ github.sha }}
          restore-keys: |
            reel-clips-

      # Which effects must (re)render: changed effects ∪ any clip missing from the
      # restored cache (ALL when a shared input changed). Empty ⇒ reuse all cached.
      - name: Plan which effects to render
        id: plan
        env:
          REEL_BASE: >-
            ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha
              || github.event_name == 'push' && github.event.before
              || '' }}
        run: echo "effects=$(node scripts/reel-changed.mjs)" >> "$GITHUB_OUTPUT"

      - name: Render changed effect clips
        if: steps.plan.outputs.effects != ''
        run: node scripts/render-clips.mjs ${{ steps.plan.outputs.effects }}

      - name: Stitch the full reel (cached + freshly rendered clips)
        run: npm run stitch

      - name: List output
        if: always()
        run: ls -laR e2e/output || echo "no output"

      - name: Upload web reel
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dopamine-web-reel
          path: |
            e2e/output/dopamine-suite.mp4
            e2e/output/clips
          if-no-files-found: warn
