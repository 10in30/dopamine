# Dopamine — Android / OpenGL ES CI.
#
# Three jobs, structured to mirror swift.yml (a free portability gate + an
# SDK-backed build + a best-effort device recording):
#   • jvm      — the portability + correctness gate on a FREE ubuntu runner with
#                NO Android SDK: builds the pure-Kotlin `dopamine-core` and runs
#                the 192-case byte-parity grid against the SAME web fixture swift
#                asserts. The analog of swift's Linux job. MUST-PASS.
#   • build    — installs the Android SDK and `assembleDebug`s the GL backbone +
#                the effect packages + the demo APK (proving the `android.*` half
#                compiles). MUST-PASS.
#   • emulator — boots an emulator, installs the demo, autoplays every registered
#                effect at slow-mo, and screen-records a clip (proves the GLSL
#                actually compiles + runs on a real GL ES driver). BEST-EFFORT.
#
# COST NOTE: the `jvm` gate runs on free runners; the SDK build + emulator are
# heavier. The paths filter keeps this off web/swift-only changes.

name: android

on:
  push:
    branches: ["main"]
    paths:
      - "android/**"
      - "effects/**"                         # single-folder effect sources (built to dist/)
      - "tools/dopamine/**"                  # the cross-platform build toolchain
      - ".github/workflows/android.yml"
  pull_request:
    paths:
      - "android/**"
      - "effects/**"
      - "tools/dopamine/**"
      - ".github/workflows/android.yml"
  workflow_dispatch:

jobs:
  # ===========================================================================
  # JVM — the free correctness gate. No Android SDK, so settings configures only
  # the pure-Kotlin dopamine-core; the parity grid runs on a plain JVM.
  # ===========================================================================
  jvm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      # `dopamine build` transpiles the single-source web GLSL → MSL/Android via
      # esbuild, so it needs the node deps. --ignore-scripts skips Playwright/ffmpeg
      # downloads; esbuild's platform binary is an optional dep in the lockfile.
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Install toolchain deps (esbuild for dopamine build)
        run: npm ci --ignore-scripts

      # The headline data-spine invariant. Every effect now lives in the
      # single-folder model (effects/<name>/) and the @dopamine/build toolchain
      # emits the .dope into each platform package under dist/. Assert, for EVERY
      # effect, that the .dope embedded in all three platform packages (android
      # assets / web src / swift Resources) is byte-identical — the cross-platform
      # spine invariant, as a build property. Also assert the dopamine-core JVM
      # parity grid's test resource matches that same canonical embed.
      - name: .dope byte-parity (every effect's dist embeds identical across platforms)
        run: |
          set -e
          python3 -m pip install --quiet --break-system-packages fonttools brotli \
            || python3 -m pip install --quiet fonttools brotli
          node tools/dopamine/src/cli.mjs build
          status=0
          for dir in effects/*/; do
            name=$(basename "$dir")
            pascal=$(python3 -c "import sys; print(sys.argv[1].capitalize())" "$name")
            a="dist/android/dopamine-effect-$name/src/main/assets/$name.dope.json"
            w="dist/web/effect-$name/src/$name.dope.json"
            s="dist/swift/DopamineEffect$pascal/Sources/DopamineEffect$pascal/Resources/$name.dope.json"
            am=$(md5sum < "$a" | cut -d' ' -f1)
            wm=$(md5sum < "$w" | cut -d' ' -f1)
            sm=$(md5sum < "$s" | cut -d' ' -f1)
            if [ "$am" = "$wm" ] && [ "$wm" = "$sm" ]; then
              echo "ok: $name embeds identical ($am)"
            else
              echo "DRIFT: $name embeds differ — android=$am web=$wm swift=$sm"; status=1
            fi
            # The dopamine-core JVM parity grid resource (only solarbloom today).
            core="android/dopamine-core/src/test/resources/$name.dope.json"
            if [ -f "$core" ] && [ "$(md5sum < "$core" | cut -d' ' -f1)" != "$am" ]; then
              echo "DRIFT: $core != the canonical $name embed"; status=1
            fi
          done
          exit $status

      - name: parity gate (dopamine-core, 192-case grid)
        working-directory: android
        run: ./gradlew :dopamine-core:test --no-daemon --stacktrace

  # ===========================================================================
  # build — the Android build. Installs the SDK so settings includes the GL +
  # effect + demo modules, then assembles the debug APK + libraries.
  # ===========================================================================
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: android-actions/setup-android@v3
      - name: Install SDK packages
        run: |
          set -x
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0"

      - name: Gradle cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('android/**/*.gradle.kts', 'android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Install toolchain deps (esbuild for dopamine build)
        run: npm ci --ignore-scripts

      - name: dopamine build (generate dist/ platform packages incl. comic + fonts)
        run: |
          python3 -m pip install --quiet --break-system-packages fonttools brotli \
            || python3 -m pip install --quiet fonttools brotli
          node tools/dopamine/src/cli.mjs build

      - name: assembleDebug (GL backbone + effects + demo APK)
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload demo APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dopamine-demo-apk
          path: android/demo/build/outputs/apk/debug/*.apk
          if-no-files-found: warn

  # ===========================================================================
  # emulator — BEST-EFFORT. Boots an emulator with a real GL ES driver, installs
  # the demo, autoplays every effect at slow-mo, and screen-records a clip. This
  # is what actually proves the GLSL compiles + runs (a build can't).
  # ===========================================================================
  emulator:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: android-actions/setup-android@v3

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm || true

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Install toolchain deps (esbuild for dopamine build)
        run: npm ci --ignore-scripts

      - name: dopamine build (generate dist/ platform packages incl. comic + fonts)
        run: |
          python3 -m pip install --quiet --break-system-packages fonttools brotli \
            || python3 -m pip install --quiet fonttools brotli
          node tools/dopamine/src/cli.mjs build

      - name: Build the demo APK
        working-directory: android
        run: ./gradlew :demo:assembleDebug --no-daemon --stacktrace

      # ffmpeg is NOT preinstalled on the ubuntu-24.04 runner image — install it so
      # the recording script can speed the slow-mo capture back to real time.
      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Boot emulator, autoplay all nine, record + speed to real time
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          force-avd-creation: true
          # swiftshader_indirect = a software GL ES driver (no host GPU needed on the
          # CI runner) that still compiles + runs our GLSL ES 3.00 — the proof a
          # build can't give.
          emulator-options: -no-window -gpu swiftshader_indirect -no-snapshot -noaudio -no-boot-anim
          disable-animations: true
          # NOTE: android-emulator-runner runs `script` LINE BY LINE (each line its own
          # `sh -c`), which breaks backslash continuations + multi-line blocks — so the
          # real logic lives in a committed bash file invoked here in ONE line.
          script: bash android/ci/emulator-record.sh

      - name: Upload emulator clip
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dopamine-android-clip
          path: /tmp/out
          if-no-files-found: warn
