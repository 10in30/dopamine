# Dopamine — npm RELEASE (Changesets).
#
# Independent, per-package versioning for every published @dopaminefx/* package
# (the shared runtime @dopaminefx/core, @dopaminefx/effects, @dopaminefx/react,
# the build tools @dopaminefx/build, and each @dopaminefx/effect-*). The private
# @dopaminefx/demo is never published (ignored in .changeset/config.json).
#
# FLOW (standard Changesets two-step — see RELEASING.md):
#   - Contributors run `npm run changeset` in their PRs to record the bump type
#     (patch/minor/major) per package they touched.
#   - On push to main, this workflow runs `changesets/action`. If pending
#     changesets exist it opens/updates a "Version Packages" PR (bumps versions,
#     updates internal dep ranges, writes CHANGELOG.md). When that PR is merged
#     (no changesets remain) it runs `npm run release` → builds every package and
#     `changeset publish`es the bumped ones to npm WITH PROVENANCE, creating a
#     `pkg@version` git tag for each published package.
#
# SECRETS REQUIRED (one-time setup, documented in RELEASING.md):
#   - NPM_TOKEN — a granular automation token for the @dopaminefx npm org with
#     read+write to its packages (and "no 2FA required" for automation).
#
# Provenance (`--provenance`, npm build attestation via OIDC) needs `id-token:
# write` and a public repository; the `repository` field on each package.json
# must match this repo.

name: release

on:
  push:
    branches: ["main"]
  workflow_dispatch:

# Never run two releases concurrently (they'd race on the Version PR / publish).
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write        # create the Version PR commit + the pkg@version git tags
  pull-requests: write   # open/update the "Version Packages" PR
  id-token: write        # npm provenance (OIDC build attestation)

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json
          registry-url: "https://registry.npmjs.org"

      - name: Install deps
        run: |
          n=0
          until npm ci; do
            n=$((n+1))
            if [ "$n" -ge 4 ]; then echo "npm ci failed after $n attempts"; exit 1; fi
            echo "npm ci failed (attempt $n) — retrying in 15s…"; sleep 15
          done

      # `dopamine build` (run by `build:packages`) converts the comic display
      # faces woff2→ttf for the Swift/Android embeds, which needs fonttools+brotli.
      - name: Install fonttools (woff2→ttf for dopamine build)
        run: |
          python3 -m pip install --quiet --break-system-packages fonttools brotli \
            || python3 -m pip install --quiet fonttools brotli

      - name: Create Release PR or publish to npm
        uses: changesets/action@v1
        with:
          version: npm run version
          publish: npm run release
          commit: "chore: version packages"
          title: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"
